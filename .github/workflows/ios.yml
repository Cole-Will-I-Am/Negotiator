name: iOS — Build

# Compile sanity check on every push to main (no signing, no upload). The TestFlight
# upload is a separate manual dispatch in ios-release.yml.

on:
  push:
    branches: [main]
    paths:
      - "Negotiator/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen and generate project
        run: |
          set -euo pipefail
          brew install xcodegen
          cd Negotiator && xcodegen generate

      - name: Build (no signing)
        run: |
          set -euo pipefail
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -n1 | xargs)
          if [ -z "$DEVICE" ]; then echo "::error::No iPhone simulator available"; exit 1; fi
          echo "Building on simulator: $DEVICE"
          xcodebuild build \
            -project Negotiator/Negotiator.xcodeproj \
            -scheme Negotiator \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO
